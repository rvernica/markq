name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref (PR branch / main) when a new
# commit arrives, so rapid pushes don't pile up redundant queued builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Override the Fedora-specific clang resource path set in .cargo/config.toml.
  # Ubuntu's clang co-locates its resource directory, so bindgen finds it
  # automatically. Leaving this empty avoids a non-existent -isystem path.
  BINDGEN_EXTRA_CLANG_ARGS: ""

jobs:
  test:
    name: test (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install protoc
        # lance-encoding's build script invokes protoc to compile its .proto files.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo test --doc
        # --all-targets above deliberately excludes doctests; run them
        # separately so /// examples in markq-core/markq-cli/... are
        # compiled and exercised in CI.
        run: cargo test --workspace --doc
