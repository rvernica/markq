name: Release

# Build prebuilt Linux binaries and attach them to a GitHub Release.
#
# Triggers on annotated/lightweight tags shaped `vX.Y.Z`. Also exposed via
# workflow_dispatch so the build can be exercised manually before tagging
# (manual runs build the artifacts but skip the release-upload step).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# The release-upload step creates/updates a GitHub Release, which needs write
# access to repository contents.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # .cargo/config.toml hard-codes the Fedora clang resource directory. Ubuntu's
  # clang co-locates it, so bindgen finds the headers without help; clearing the
  # var avoids passing a -isystem path that doesn't exist on the runner.
  BINDGEN_EXTRA_CLANG_ARGS: ""

jobs:
  build:
    # ubuntu-22.04 pins the glibc floor at 2.35. Binaries built here run on any
    # distro with glibc >= 2.35 (Ubuntu 22.04+, Debian 12+, Fedora 36+). Bump
    # the runner only when you intend to raise that floor.
    runs-on: ubuntu-22.04
    strategy:
      # Don't let a Vulkan-toolchain hiccup block shipping the CPU build.
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            features: ""
          - variant: vulkan
            features: "--features vulkan"

    name: build (linux-x86_64-${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        # clang/libclang: bindgen FFI generation in llama-cpp-sys-2.
        # cmake: llama.cpp's build (preinstalled on the runner, pinned for clarity).
        # protobuf-compiler: lance-encoding build script invokes protoc.
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake protobuf-compiler

      - name: Install Vulkan toolchain
        if: matrix.variant == 'vulkan'
        # llama.cpp's Vulkan backend compiles its compute shaders at build time
        # with glslc (shaderc), which Ubuntu's own apt repos don't ship. The
        # LunarG Vulkan SDK repo provides glslc plus the loader/headers via the
        # `vulkan-sdk` meta-package. `jammy` matches ubuntu-22.04.
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.variant }}

      - name: Build
        run: cargo build --release --locked -p markq-cli ${{ matrix.features }}

      - name: Package
        id: package
        run: |
          ver="${GITHUB_REF_NAME}"
          name="markq-${ver}-linux-x86_64-${{ matrix.variant }}"
          mkdir -p "dist/${name}"
          cp target/release/markq "dist/${name}/"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          echo "tarball=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        # Each variant publishes its tarball + checksum as a workflow artifact.
        # On tag pushes the `release` job below collects them; on manual runs
        # they remain downloadable directly from the run.
        uses: actions/upload-artifact@v4
        with:
          name: markq-linux-x86_64-${{ matrix.variant }}
          path: dist/*.tar.gz*

  # Single upload job so only one process touches the GitHub Release. Running
  # the per-variant attach concurrently inside the matrix lets both jobs race
  # to *create* the not-yet-existing release, and one loses with a 422 — which,
  # under fail-fast: false, would silently drop that variant's binary from the
  # release. Gating this on tag pushes keeps manual runs release-free.
  release:
    name: attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256
